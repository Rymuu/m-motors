services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: m-motors-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - NODE_ENV=production
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mmotors-api.rule=Host(`api.m-motors.rymuwu.com`)"
      - "traefik.http.routers.mmotors-api.entrypoints=websecure"
      - "traefik.http.routers.mmotors-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.mmotors-api.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: m-motors-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://api.m-motors.rymuwu.com
      - NODE_ENV=production
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mmotors-web.rule=Host(`m-motors.rymuwu.com`)"
      - "traefik.http.routers.mmotors-web.entrypoints=websecure"
      - "traefik.http.routers.mmotors-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.mmotors-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"

  db:
    image: postgres:16-alpine
    container_name: m-motors-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mmotors
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data: